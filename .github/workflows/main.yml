name: 尾盘选股次日卖出
on:
  schedule:
    - cron: "30 6 * * 1-5"
    - cron: "35 0 * * 1-5"
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install libraries
        run: pip install tushare requests
      - name: Run main.py
        run: python main.py
